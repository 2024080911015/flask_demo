<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园交友推荐网络仪表盘 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #6366f1; }
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .loading-pulse { animation: pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-indigo-900 flex items-center gap-2">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                校园交友推荐大屏 <span class="text-xs font-mono px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded">v2.0</span>
            </h1>
            <div class="flex items-center gap-2 w-full md:w-auto">
                <input type="number" id="searchInput" placeholder="输入学号 (如: 1)" class="w-full md:w-64 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-100 focus:border-indigo-300 outline-none transition">
                <button onclick="searchUser()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition flex items-center gap-2 shrink-0 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    开始分析
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        <section id="globalStats" class="mb-8 grid grid-cols-2 lg:grid-cols-5 gap-4">
            <div class="col-span-2 lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 loading-pulse">
                正在同步全站社交网络数据...
            </div>
        </section>

        <div id="resultsArea" class="hidden grid grid-cols-1 xl:grid-cols-4 gap-8">

            <aside class="xl:col-span-1 space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-900 mb-5 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        推荐生成配置
                    </h3>
                    <div class="space-y-4 text-sm">
                        <div>
                            <label class="block text-gray-600 mb-1.5 font-medium">推荐模式</label>
                            <div class="grid grid-cols-2 gap-2 bg-gray-50 p-1 rounded-lg border">
                                <button id="mode-social" onclick="setMode('social')" class="px-3 py-1.5 rounded-md transition text-center tab-active bg-white shadow">社交网络优化</button>
                                <button id="mode-gnn" onclick="setMode('gnn')" class="px-3 py-1.5 rounded-md transition text-center text-gray-600">纯相似度模式</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-600 mb-1.5 font-medium">指定圈层 (可选)</label>
                            <select id="communitySelect" class="w-full px-3 py-2 border rounded-lg bg-white focus:ring-1 focus:ring-indigo-100 outline-none">
                                <option value="">不限社区</option>
                                </select>
                        </div>
                        <button onclick="applyFilters()" class="w-full mt-2 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-4 py-2.5 rounded-lg font-medium transition text-xs flex items-center justify-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            重新生成推荐
                        </button>
                    </div>
                </div>

                <div id="diagnosticPanel" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hidden">
                    <h3 class="text-lg font-bold text-gray-900 mb-5 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        社交雷达报告
                    </h3>
                    <div class="flex items-center gap-3 mb-5 p-3 bg-gray-50 rounded-xl">
                        <div id="diagTitle" class="font-bold text-3xl text-indigo-600 shrink-0">核心</div>
                        <p id="diagDesc" class="text-xs text-gray-600 leading-relaxed"></p>
                    </div>
                    <div class="mb-5 h-72 flex items-center justify-center relative">
                        <canvas id="communityChart"></canvas>
                        <div id="connectionsCount" class="absolute text-center">
                            <div class="text-3xl font-extrabold text-gray-800" id="diagConnCount">0</div>
                            <div class="text-[10px] text-gray-500">总连接数</div>
                        </div>
                    </div>
                    <p class="text-[10px] text-gray-400 text-center leading-tight">注：因好友可能同时具有多重身份（如既爱运动又爱技术），圈层比例可大于100%</p>
                    <div class="p-3 bg-blue-50 text-blue-800 rounded-lg text-xs leading-relaxed">
                        <strong>AI 行动建议：</strong> <span id="diagAdvice">正在生成...</span>
                    </div>
                </div>
            </aside>

            <section class="xl:col-span-3 space-y-6">
                <div class="bg-indigo-600 text-white p-6 rounded-2xl shadow-lg shadow-indigo-100 flex items-center gap-4">
                    <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center font-bold text-2xl border-2 border-white/50">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zm-4 7a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <div>
                        <p class="text-indigo-100 text-sm">正在深度分析用户</p>
                        <h2 class="text-3xl font-extrabold tracking-tight">学号: #<span id="displayUserId"></span></h2>
                        <div id="displayUserInfo" class="flex flex-wrap gap-1.5 mt-2">
                            </div>
                    </div>
                </div>

                <div class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100">
                    <div class="border-b border-gray-100 flex gap-1 text-sm font-medium mb-4">
                        <button onclick="showTab('recommended')" id="tab-recommended" class="px-5 py-3 transition text-gray-500 hover:text-indigo-600 tab-active">✨ AI 智能推荐</button>
                        <button onclick="showTab('following')" id="tab-following" class="px-5 py-3 transition text-gray-500 hover:text-indigo-600">正在关注 <span id="countFollowing" class="ml-1 text-xs opacity-60"></span></button>
                        <button onclick="showTab('followers')" id="tab-followers" class="px-5 py-3 transition text-gray-500 hover:text-indigo-600">我的粉丝 <span id="countFollowers" class="ml-1 text-xs opacity-60"></span></button>
                    </div>

                    <div id="tabContent_recommended" class="p-2 space-y-4">
                        <div id="recommendList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            </div>
                    </div>
                    <div id="tabContent_following" class="p-2 hidden">
                        <div id="followingList" class="custom-scroll space-y-3 max-h-96 overflow-y-auto pr-1">
                            </div>
                    </div>
                    <div id="tabContent_followers" class="p-2 hidden">
                        <div id="followersList" class="custom-scroll space-y-3 max-h-96 overflow-y-auto pr-1">
                            </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="emptyState" class="flex flex-col items-center justify-center h-[60vh] text-gray-400 bg-white rounded-2xl shadow-sm border border-gray-100 mt-8">
            <svg class="w-20 h-20 mb-6 opacity-30 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <p class="text-xl font-medium text-gray-600">校园社交网络大屏</p>
            <p class="text-sm mt-2">在顶部输入学号，开启全景社交分析与 AI 推荐</p>
        </div>
        <div id="errorState" class="hidden flex flex-col items-center justify-center h-[60vh] bg-white rounded-2xl shadow-sm border border-red-100 mt-8 transition-all">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <p class="text-xl font-bold text-gray-800 mb-2">查询异常</p>
            <p class="text-sm text-gray-500 mb-6" id="errorMessage">该学号不存在或系统繁忙，请检查后重试</p>
            <button onclick="document.getElementById('searchInput').focus(); document.getElementById('searchInput').select();" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium text-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                重新输入学号
            </button>
        </div>
    </main>

    <script>
        // 全局状态
        let currentUserId = null;
        let currentMode = 'social'; // 默认：社交网络优化
        let myChart = null; // Chart 实例

        // 颜色调色板 (Tailwind Indigo)
        const colors = [
            'rgba(129, 140, 248, 0.7)', // indigo 400
            'rgba(52, 211, 153, 0.7)',  // emerald 400
            'rgba(251, 191, 36, 0.7)',  // amber 400
            'rgba(248, 113, 113, 0.7)', // red 400
            'rgba(56, 189, 248, 0.7)'   // sky 400
        ];

        // 页面初始化
        window.onload = () => {
            fetchStats();
            fetchCommunities();
        };

        // 拓展功能 P1: 获取全站统计
        async function fetchStats() {
            try {
                const res = await fetch('/social/stats');
                const data = await res.json();
                const container = document.getElementById('globalStats');

                const stats = [
                    { label: '注册学生', value: data.total_users, icon: '🎓' },
                    { label: '社交连边 (Edges)', value: data.total_follows, icon: '🔗' },
                    { label: '平均关注数', value: data.average_follows.toFixed(2), icon: '📊' },
                    { label: '最高活跃度', value: data.max_follows, icon: '🔥' },
                    { label: '网络密度', value: (data.total_follows / (data.total_users * (data.total_users-1))).toFixed(4), icon: '🕸️' }
                ];

                container.innerHTML = stats.map(s => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 transition hover:shadow-lg hover:shadow-indigo-50 hover:-translate-y-0.5">
                        <div class="text-3xl">${s.icon}</div>
                        <div>
                            <div class="text-xs text-gray-500 mb-0.5">${s.label}</div>
                            <div class="text-2xl font-extrabold text-gray-950">${s.value}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("加载统计数据失败");
            }
        }

        // 核心功能 P0: 获取社区列表
        async function fetchCommunities() {
            try {
                const res = await fetch('/community');
                const data = await res.json();
                const select = document.getElementById('communitySelect');
                data.communities.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c; opt.innerText = c;
                    select.appendChild(opt);
                });
            } catch (e) { console.error("加载社区失败"); }
        }

        // 配置控制
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-social').className = mode === 'social' ? 'px-3 py-1.5 rounded-md transition text-center tab-active bg-white shadow' : 'px-3 py-1.5 rounded-md transition text-center text-gray-600';
            document.getElementById('mode-gnn').className = mode === 'gnn' ? 'px-3 py-1.5 rounded-md transition text-center tab-active bg-white shadow' : 'px-3 py-1.5 rounded-md transition text-center text-gray-600';
        }

        function applyFilters() { if (currentUserId) searchUser(currentUserId); }

        // 解析用户信息字符串为标签 HTML
        function parseInfoTags(infoStr, isIndigo=false) {
            const pairs = infoStr.split(',');
            let basicHtml = '';
            let hobbiesHtml = '';

            pairs.forEach(p => {
                const [key, value] = p.split(':');
                if(!value) return;

                if (key === '爱好' || key === '标签') {
                    const tags = value.split(' ').filter(t => t.trim()!=='');
                    const cls = isIndigo ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-600';
                    hobbiesHtml += tags.map(t => `<span class="px-2 py-0.5 ${cls} rounded text-[10px] font-medium">${t}</span>`).join('');
                } else {
                    const cls = isIndigo ? 'bg-indigo-700 text-white' : 'bg-indigo-50 text-indigo-700';
                    basicHtml += `<span class="px-2 py-1 ${cls} rounded-md text-xs font-semibold">${value}</span>`;
                }
            });
            return { basic: basicHtml, hobbies: hobbiesHtml };
        }

        // 主搜索逻辑
// 主搜索逻辑
// 主搜索逻辑
        async function searchUser(explicitId = null) {
            const sid = explicitId || document.getElementById('searchInput').value;
            if (!sid) return;
            currentUserId = sid;

            // UI 切换：隐藏所有状态面板
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultsArea').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');

            if(!explicitId) {
                setMode('social');
                document.getElementById('communitySelect').value = '';
            }
            const comm = document.getElementById('communitySelect').value;

            try {
                // P1: 并发请求
                const [tuijianRes, reportRes, followingRes, followersRes] = await Promise.all([
                    fetch(`/tuijian?id=${sid}&mode=${currentMode}&community=${comm}`),
                    fetch(`/social/report?id=${sid}`),
                    fetch(`/following?id=${sid}`),
                    fetch(`/followers?id=${sid}`)
                ]);

                // 【增强拦截 1】如果接口返回了 404 或 500 错误（说明后端可能崩溃了）
                if (!tuijianRes.ok || !reportRes.ok) {
                    throw new Error("用户不存在");
                }

                const tuijianData = await tuijianRes.json();

                // 【增强拦截 2】如果后端显式返回了 error，或者返回了原始的占位符字符串
                if (tuijianData.error ||
                    !tuijianData.student_info ||
                    tuijianData.student_info === `User ${sid}` ||
                    tuijianData.student_info === `ID:${sid}`) {
                    throw new Error("用户不存在");
                }

                // 尝试解析其他接口数据
                const reportData = await reportRes.json();
                const followingData = await followingRes.json();
                const followersData = await followersRes.json();

                // 1. 渲染用户画像
                document.getElementById('displayUserId').innerText = sid;
                const userTags = parseInfoTags(tuijianData.student_info, true);
                document.getElementById('displayUserInfo').innerHTML = userTags.basic + userTags.hobbies;

                // 2. 渲染推荐卡片
                const recContainer = document.getElementById('recommendList');
                recContainer.innerHTML = '';
                if (!tuijianData.recommend_friends || tuijianData.recommend_friends.length === 0) {
                    recContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-16 text-gray-400">
                            <div class="text-6xl mb-4">🤔</div>
                            <p class="text-sm">暂时没有找到合适的推荐</p>
                        </div>
                    `;
                } else {
                    tuijianData.recommend_friends.forEach((info, index) => {
                        const tags = parseInfoTags(info);
                        recContainer.innerHTML += `
                            <div class="bg-gray-50/50 p-5 rounded-xl border border-gray-100 transition hover:border-indigo-100 hover:bg-indigo-50/20 group">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="flex flex-wrap gap-1.5">${tags.basic}</div>
                                    <span class="text-xl font-bold text-indigo-200 group-hover:text-indigo-500 transition">#${index+1}</span>
                                </div>
                                <div class="flex flex-wrap gap-1 mt-2">${tags.hobbies}</div>
                            </div>
                        `;
                    });
                }

                // 3. 渲染粉丝/关注列表
                renderRelationList('following', followingData.following);
                document.getElementById('countFollowing').innerText = followingData.count || 0;
                renderRelationList('followers', followersData.followers);
                document.getElementById('countFollowers').innerText = followersData.followers_count || 0;

                // 4. 渲染 AI 诊断报告
                renderDiagnostic(reportData);

                // 成功：显示结果区域
                document.getElementById('resultsArea').classList.remove('hidden');
                showTab('recommended');

            } catch (err) {
                // 失败拦截：准确捕获我们抛出的 "用户不存在" 错误
                document.getElementById('errorState').classList.remove('hidden');

                // 判断如果是我们主动抛出的错误，或者是解析 JSON 失败的错误
                if (err.message === "用户不存在" || err.message.includes("Unexpected token") || err.message.includes("JSON")) {
                    document.getElementById('errorMessage').innerText = `系统数据库中未找到学号为 ${sid} 的用户节点，请核对后重新输入。`;
                } else {
                    document.getElementById('errorMessage').innerText = "获取网络数据时发生异常: " + err.message;
                }
            }
        }
        // 通用列表渲染
        function renderRelationList(type, list) {
            const container = document.getElementById(`${type}List`);
            container.innerHTML = '';
            if(!list || list.length === 0) { container.innerHTML = '<p class="text-xs text-gray-400 p-2">暂无关系</p>'; return; }

            list.forEach(info => {
                const tags = parseInfoTags(info);
                container.innerHTML += `
                    <div class="p-3 bg-gray-50/50 rounded-lg border text-xs flex items-center justify-between gap-3">
                        <div class="flex-1 flex items-center gap-2 overflow-hidden">
                            <div class="flex gap-1 shrink-0">${tags.basic}</div>
                            <div class="flex-1 flex flex-wrap gap-0.5 overflow-hidden text-ellipsis whitespace-nowrap">${tags.hobbies}</div>
                        </div>
                    </div>
                `;
            });
        }

        // P1: AI 诊断与图表生成
        function renderDiagnostic(data) {
            document.getElementById('diagnosticPanel').classList.remove('hidden');
            document.getElementById('diagTitle').innerText = data.status.title;
            document.getElementById('diagDesc').innerText = data.status.description;
            document.getElementById('diagConnCount').innerText = data.status.total_connections;
            document.getElementById('diagAdvice').innerText = data.advice;

            // 销毁旧图表
            if(myChart) myChart.destroy();

            // 准备图表数据
            const labels = data.distribution.map(d => d.name);
            const values = data.distribution.map(d => d.count);

            // 初始化 Chart.js
            const ctx = document.getElementById('communityChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderWidth: 1,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'right',
                            labels: {
                                font: { size: 9 },
                                padding: 8,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                generateLabels: function(chart) {
                                    const data = chart.data;
                                    return data.labels.map((label, i) => ({
                                        text: `${label} (${data.datasets[0].data[i]}人)`,
                                        fillStyle: data.datasets[0].backgroundColor[i],
                                        hidden: false,
                                        index: i
                                    }));
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.label}: ${context.raw}人`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Tab 切换逻辑
        function showTab(tabName) {
            const tabs = ['recommended', 'following', 'followers'];
            tabs.forEach(t => {
                document.getElementById(`tabContent_${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`tabContent_${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).classList.add('tab-active');
        }

        // 支持回车搜索
        document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchUser(); });
    </script>
</body>
</html>
